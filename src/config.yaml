# Global logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
logging_level: "INFO"

classifier_llm_client:
  type: "GeminiClient"
  parameters:
    model: "gemini-3.1-flash-lite-preview"
    api_key_env: "GEMINI_API_KEY"

extractor_llm_client:
  type: "GeminiClient"
  parameters:
    model: "gemini-3-flash-preview"
    api_key_env: "GEMINI_API_KEY"

# Alternative configuration for Gemma using LiteLLM with thinking support:
# extractor_llm_client:
#   type: "LiteLLMClient"
#   parameters:
#     model: "openai/google/gemma-4-31B-it"
#     api_key_env: "LITELLM_API_KEY"
#     api_base: "http://localhost:8000/v1"
#     enable_thinking: true
#     config:
#       extra_body:
#         mm_processor_kwargs:
#           max_soft_tokens: 560

# Maximum number of pages supported in an uploaded PDF document.
max_pdf_pages: 40

supported_types:
  - "LABORATORY_REPORT"

# Policy for validating documents with unsupported types.
# ACCEPT_ALL: Accepts the document regardless of unsupported types.
# ALLOW_UNSUPPORTED_NON_MEDICAL: Process only supported segments if unsupported types are non-medical or smart reports.
# ALLOW_ONLY_SUPPORTED: Discard the document if any unsupported type is present.
document_standardization_policy: ACCEPT_ALL

# When true, attaches the entire source document (base64 encoded) to the first
# generated FHIR bundle that contains a valid patient/subject.
# NOTE: Avoid enabling this if the uploaded document contains data for multiple
# patients, as it will link the entire document to only the first identified patient.
ATTACH_DOCUMENT_TO_BUNDLE: false

# When true, returns detailed pipeline metadata (latencies, tokens) in the response.
RETURN_METADATA: false

# Paths to the CSV files containing LOINC Knowledge Base data.
# These files are required for terminology mapping (e.g. mapping lab tests to LOINC codes).
# In a Docker environment, these files are typically not part of the codebase and should be:
# 1. Mounted as a volume from the host to the container (e.g., -v /host/path/to/kbs/:/data/).
# 2. Or downloaded during container startup by an entrypoint script.
#
# IMPORTANT: If mounting from host, ensure the files have read permissions for others
# (e.g., `chmod 644 /path/to/*.csv`) and the containing directory is accessible
# (e.g., `chmod 755 /path/to/dir`) so that the non-root user in the container can read them.
loinc_analaytes_index_csv_path: "/data/analyte_records_top_2000.csv"
loinc_system_kb_csv_path: "/data/loinc_axis_system_kb_top_2000.csv"
loinc_property_kb_csv_path: "/data/loinc_axis_property_kb_top_2000.csv"
